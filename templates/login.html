<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MyNutriApp">
    <meta name="application-name" content="MyNutriApp">
    <meta name="msapplication-TileColor" content="#0f0f0f">
    <meta name="msapplication-tap-highlight" content="no">

    <title>Accedi · MyNutriApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <main class="login-shell">
        <section class="login-container" aria-labelledby="login-heading">
            <header class="login-brand">
                <h1 id="login-heading" class="login-title">MyNutriApp</h1>
                <p class="login-subtitle">Nutrizione e benessere, in un unico spazio</p>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
              <div class="login-flashes" role="alert">
                {% for category, message in messages %}
                <div class="login-flash login-flash--{{ category }}">{{ message }}</div>
                {% endfor %}
              </div>
              {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div class="login-field">
                    <label class="login-label" for="telefono">Telefono</label>
                    <input id="telefono" type="tel" name="telefono" class="login-input" placeholder="3401234567" autocomplete="tel" inputmode="tel" required>
                </div>

                <div class="login-field">
                    <label class="login-label" for="password">Password</label>
                    <input id="password" type="password" name="password" class="login-input" autocomplete="current-password" required>
                </div>

                <button type="submit" class="login-submit">Accedi</button>
            </form>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/service-worker.js')
                .then(() => console.log("✅ Service Worker attivo"))
                .catch(err => console.error("❌ Errore SW:", err));
        }
    </script>
</body>
</html>
