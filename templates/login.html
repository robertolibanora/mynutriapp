<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 📱 PWA METATAGS -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#ff751f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="NutriApp">
    <meta name="application-name" content="NutriApp">
    <meta name="msapplication-TileColor" content="#ff751f">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- 🎨 FAVICONS -->
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="apple-touch-icon" sizes="512x512" href="{{ url_for('static', filename='icons/icon-512.png') }}">
    
    <title>MyNutriApp Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Adam+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/hussar" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-section" style="text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Enrico Nutrizionista" 
                 style="max-width: 100px; height: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 1.5rem;">
            <h1 style="color: #4CAF50; font-size: 1.4rem; margin: 0 0 0.6rem 0; font-weight: 700; line-height: 1.2; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.3rem;">
                <span style="font-family: 'Hussar Bold', sans-serif; font-style: italic; font-weight: 600;">Nutrizionista</span>
                <span style="font-family: 'Hussar Bold', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">GRANDI</span>
            </h1>
            <p style="color: #ff751f; font-family: 'Adam Script', cursive; font-size: 0.95rem; margin: 0 0 0.3rem 0; font-style: italic; font-weight: 600; line-height: 1.2; text-align: center; max-width: 300px;">
                Non Diamo Pillole, Non Diamo Consigli,
            </p>
            <p style="color: #ff751f; font-family: 'Adam Script', cursive; font-size: 1.4rem; margin: 0; font-style: italic; font-weight: 700; line-height: 1.3; text-align: center; max-width: 300px; text-shadow: 0 1px 2px rgba(0,0,0,0.3);">
                Diamo Risultati
            </p>
        </div>
        <h2 class="page-title">Accesso</h2>
        <form method="POST" class="form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label class="label">Telefono</label>
                <input type="text" name="telefono" class="input" placeholder="+39..." required>
            </div>

            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" name="password" class="input" required>
            </div>

            <button type="submit" class="btn btn-primary">Accedi</button>
        </form>
    </div>
    
    <!-- 📱 PWA SERVICE WORKER -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/service-worker.js')
                .then(() => console.log("✅ Service Worker attivo"))
                .catch(err => console.error("❌ Errore SW:", err));
        }
    </script>
</body>
</html>
