{% extends 'base_admin.html' %}
{% block title %}Modifica Vendita{% endblock %}
{% block content %}

<h2 class="page-title">{{ icon('edit', 16) }} Modifica Vendita #{{ vendita.id }}</h2>

<form method="POST" class="form-container">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

  <div class="form-group">
    <label for="listino_id">Piano (Listino)</label>
    <select id="listino_id" name="listino_id" class="input-select">
      {% for l in piani %}
      <option value="{{ l.id }}" {% if l.id == vendita.listino_id %}selected{% endif %}>
        {{ l.nome_prodotto }} - {{ "%.2f"|format(l.prezzo) }}€
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="data_inizio">Data Inizio</label>
    <input type="date" id="data_inizio" name="data_inizio" class="input-text" value="{{ vendita.data_inizio }}">
  </div>

  <div class="form-group">
    <label for="metodo_pagamento">Metodo Pagamento</label>
    <select id="metodo_pagamento" name="metodo_pagamento" class="input-select">
      {% for metodo in ['contanti', 'bonifico', 'carta', 'altro'] %}
      <option value="{{ metodo }}" {% if metodo == vendita.metodo_pagamento %}selected{% endif %}>{{ metodo }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="sconto">Sconto (€)</label>
    <input type="number" id="sconto" name="sconto" class="input-text" value="{{ "%.2f"|format(vendita.sconto) }}" step="0.01">
  </div>

  <div class="form-group">
    <label for="importo_finale">Importo Finale (€)</label>
    <input type="number" id="importo_finale" name="importo_finale" class="input-text" value="{{ "%.2f"|format(vendita.importo_finale) }}" step="0.01">
  </div>

  <div class="form-group">
    <label for="stato">Stato</label>
    <select id="stato" name="stato" class="input-select">
      {% for stato in ['pagato', 'in_attesa', 'rimborsato'] %}
      <option value="{{ stato }}" {% if stato == vendita.stato %}selected{% endif %}>{{ stato }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="note">Note</label>
    <textarea id="note" name="note" class="input-text" rows="3">{{ vendita.note }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ icon('save', 16) }} Aggiorna</button>
    <a href="{{ url_for('vendite.dettaglio_vendita', id=vendita.id) }}" class="btn btn-secondary">{{ icon('undo', 16) }} Indietro</a>
  </div>

</form>

{% endblock %}
