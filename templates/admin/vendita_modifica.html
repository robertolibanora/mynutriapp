{% extends 'base_admin.html' %}
{% block title %}Modifica Vendita{% endblock %}
{% block content %}

<h2 class="page-title">✏️ Modifica Vendita</h2>

<form method="POST" class="form-container">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

  <div class="form-group">
    <label for="patient_id">Paziente</label>
    <input type="text" class="input-text" value="{{ vendita.patient.nome }} {{ vendita.patient.cognome }}" readonly style="background: rgba(182, 177, 169, 0.1);">
  </div>

  <div class="form-group">
    <label for="listino_id">Piano (Listino)</label>
    <select id="listino_id" name="listino_id" class="input-select" required>
      {% for l in piani %}
      <option value="{{ l.id }}" {% if l.id == vendita.listino_id %}selected{% endif %}>{{ l.nome_prodotto }} - {{ "%.2f"|format(l.prezzo) }}€</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="data_inizio">Data Inizio</label>
    <input type="date" id="data_inizio" name="data_inizio" class="input-text" value="{{ vendita.data_inizio }}" required>
  </div>

  <div class="form-group">
    <label for="metodo_pagamento">Metodo di Pagamento</label>
    <select id="metodo_pagamento" name="metodo_pagamento" class="input-select" required>
      <option value="contanti" {% if vendita.metodo_pagamento == 'contanti' %}selected{% endif %}>Contanti</option>
      <option value="bonifico" {% if vendita.metodo_pagamento == 'bonifico' %}selected{% endif %}>Bonifico</option>
      <option value="carta" {% if vendita.metodo_pagamento == 'carta' %}selected{% endif %}>Carta</option>
      <option value="altro" {% if vendita.metodo_pagamento == 'altro' %}selected{% endif %}>Altro</option>
    </select>
  </div>

  <div class="form-group">
    <label for="sconto">Sconto (€)</label>
    <input type="number" id="sconto" name="sconto" class="input-text" value="{{ vendita.sconto or 0 }}" step="0.01">
  </div>

  <div class="form-group">
    <label for="stato">Stato</label>
    <select id="stato" name="stato" class="input-select" required>
      <option value="pagato" {% if vendita.stato == 'pagato' %}selected{% endif %}>✅ Pagato</option>
      <option value="in_attesa" {% if vendita.stato == 'in_attesa' %}selected{% endif %}>⏳ In Attesa</option>
      <option value="rimborsato" {% if vendita.stato == 'rimborsato' %}selected{% endif %}>↩️ Rimborsato</option>
    </select>
  </div>

  <div class="form-group">
    <label for="note">Note</label>
    <textarea id="note" name="note" class="input-text" rows="3">{{ vendita.note or '' }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; padding: 1rem 2rem;">
      <span>💾</span>
      <span>Salva Modifiche</span>
    </button>
    <a href="{{ url_for('vendite.dashboard_economia') }}" class="btn btn-secondary">↩️ Annulla</a>
  </div>

</form>

{% endblock %}
