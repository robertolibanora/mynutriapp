{% extends 'base_admin.html' %}
{% block title %}Nuovo Prodotto{% endblock %}
{% block content %}

<h2 class="page-title">➕ NUOVO PRODOTTO</h2>

<form method="POST" class="form-container">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  
  <div class="form-grid">
    <div class="form-group">
      <label for="nome_prodotto">Nome Prodotto *</label>
      <input 
        type="text" 
        id="nome_prodotto" 
        name="nome_prodotto" 
        class="input-text" 
        placeholder="Es: Piano Nutrizionale 3 Mesi"
        required
      >
    </div>
    
    <div class="form-group">
      <label for="categoria">Categoria *</label>
      <select id="categoria" name="categoria" class="input-select" required>
        <option value="">Seleziona categoria...</option>
        <option value="nutrizione">🥗 Piano Nutrizionale</option>
        <option value="allenamento">🏋️ Piano Allenamento</option>
        <option value="completo">🌟 Piano Completo</option>
        <option value="1to1">💪 Allenamento 1 to 1</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="durata_mesi">Durata (mesi o n° allenamenti) *</label>
      <input 
        type="number" 
        id="durata_mesi" 
        name="durata_mesi" 
        class="input-text" 
        placeholder="Es: 1, 3, 6"
        required
      >
    </div>
    
    <div class="form-group">
      <label for="prezzo">Prezzo (€) *</label>
      <input 
        type="number" 
        step="0.01" 
        id="prezzo" 
        name="prezzo" 
        class="input-text" 
        placeholder="Es: 79.00"
        required
      >
    </div>
    
    <div class="form-group">
    </div>
    
    <div class="form-group">
      <label for="check_inclusi">Check Inclusi</label>
      <input 
        type="number" 
        id="check_inclusi" 
        name="check_inclusi" 
        class="input-text" 
        placeholder="Es: 1, 3, 5"
        value="0"
      >
    </div>
  </div>
  
  <div class="form-group">
    <label for="note">Note (opzionale)</label>
    <textarea 
      id="note" 
      name="note" 
      class="input-text" 
      rows="3"
      placeholder="Es: Il più scelto! Include follow-up WhatsApp"
    ></textarea>
  </div>
  
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">💾 Crea Prodotto</button>
    <a href="{{ url_for('listino.lista_listino_admin') }}" class="btn btn-secondary">↩️ Annulla</a>
  </div>

</form>

{% endblock %}
