{% extends 'base_user.html' %}
{% block title %}Nuovo Check - NutriApp{% endblock %}
{% block content %}

<h1 class="page-title-user">📊 Nuovo Check Progresso</h1>

<form method="POST" class="card-user">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="card-body">
        <div class="form-group mb-2">
            <label for="peso_settimanale" class="card-label" style="display: block; margin-bottom: 0.5rem;">Peso Attuale (kg) *</label>
            <input 
                type="number" 
                step="0.1" 
                id="peso_settimanale" 
                name="peso_settimanale" 
                class="btn-user" 
                style="width: 100%; text-align: center; font-size: 1.5rem; font-weight: 700; color: #ff751f;"
                placeholder="Es: 75.5"
                required
            >
        </div>
        
        <div class="form-group mb-2">
            <label for="aderenza" class="card-label" style="display: block; margin-bottom: 0.5rem;">Aderenza alla Dieta (1-10, opzionale)</label>
            <select id="aderenza" name="aderenza" class="btn-user" style="width: 100%; text-align: left;">
                <option value="">Seleziona...</option>
                <option value="10">🟢 10 - Perfetta</option>
                <option value="9">🟢 9 - Ottima</option>
                <option value="8">🟢 8 - Molto Buona</option>
                <option value="7">🟡 7 - Buona</option>
                <option value="6">🟡 6 - Discreta</option>
                <option value="5">🟠 5 - Sufficiente</option>
                <option value="4">🟠 4 - Mediocre</option>
                <option value="3">🔴 3 - Scarsa</option>
                <option value="2">🔴 2 - Molto Scarsa</option>
                <option value="1">🔴 1 - Pessima</option>
            </select>
        </div>
        
        <div class="form-group mb-2">
            <label for="frequenza_allenamenti" class="card-label" style="display: block; margin-bottom: 0.5rem;">Allenamenti questa Settimana (opzionale)</label>
            <select id="frequenza_allenamenti" name="frequenza_allenamenti" class="btn-user" style="width: 100%; text-align: left;">
                <option value="">Seleziona...</option>
                <option value="0">0 volte</option>
                <option value="1">1 volta</option>
                <option value="2">2 volte</option>
                <option value="3">3 volte</option>
                <option value="4">4 volte</option>
                <option value="5+">5+ volte</option>
            </select>
        </div>
    </div>
    
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
        <button type="submit" class="btn-user" style="flex: 1;">
            💾 Salva Check
        </button>
        <a href="{{ url_for('progressi.lista_progressi_user') }}" class="btn-user btn-user-secondary" style="flex: 1; text-align: center;">
            ↩️ Annulla
        </a>
    </div>
</form>

<!-- LINK PRESENTAZIONE ROBERTO -->
<div style="text-align: center; margin: 1rem 0;">
    <span style="color: #b6b1a9; font-size: 0.9rem;">
        Powered by <a href="{{ url_for('presentazione_roberto') }}" style="color: #ff751f; text-decoration: none;">Roberto Libanora</a>
    </span>
</div>

{% endblock %}
