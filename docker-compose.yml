# ========================================
# 🐳 DOCKER COMPOSE PER MYNUTRIAPP
# Orchestrazione di tutti i servizi
# ========================================

services:
  # ========================================
  # 🌐 APPLICAZIONE FLASK (Web Server)
  # ========================================
  web:
    build: .
    container_name: mynutriapp_web
    # Porta NON esposta direttamente, solo tramite Caddy
    expose:
      - "8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://mynutriapp:${MYSQL_PASSWORD:-N0ira2026!}@db:3306/mynutriapp?charset=utf8mb4
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-I0E6TjyZ4wMBqkXNsUsQXBHCZQWf8rfpeyM-X2KQ7lA}
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD:-I0E6TjyZ4wMBqkXNsUsQXBHCZQWf8rfpeyM-X2KQ7lA}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - mynutriapp_network

  # ========================================
  # 🌐 CADDY (Reverse Proxy & SSL Automatico)
  # ========================================
  caddy:
    image: caddy:2-alpine
    container_name: mynutriapp_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # Per HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/usr/share/caddy/static:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./logs/caddy:/var/log/caddy
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - mynutriapp_network

  # ========================================
  # 🗄️ DATABASE MYSQL
  # ========================================
  db:
    image: mysql:8.0
    container_name: mynutriapp_db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-N0ira2026!}
      - MYSQL_DATABASE=mynutriapp
      - MYSQL_USER=mynutriapp
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-N0ira2026!}
      # Ottimizzazioni MySQL per produzione
      - MYSQL_INNODB_BUFFER_POOL_SIZE=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - MYSQL_MAX_CONNECTIONS=${MYSQL_MAX_CONNECTIONS:-200}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Temporaneamente disabilitato per debug
      # - ./mysql-production.cnf:/etc/mysql/conf.d/production.cnf:ro
    ports:
      - "3306:3306"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # Verifica che MySQL sia pronto e che il database sia accessibile
      # MySQL esegue init.sql automaticamente al primo avvio (quando il volume è vuoto)
      # start_period aumentato a 60s per dare più tempo all'inizializzazione
      test: ["CMD", "bash", "-c", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - mynutriapp_network

  # ========================================
  # ⚡ REDIS (Rate Limiting & Cache)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: mynutriapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-I0E6TjyZ4wMBqkXNsUsQXBHCZQWf8rfpeyM-X2KQ7lA}
    networks:
      - mynutriapp_network

  # ========================================
  # 📊 PHPMYADMIN (Gestione Database - Opzionale)
  # ========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mynutriapp_phpmyadmin
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - mynutriapp_network


# ========================================
# 💾 VOLUMI PERSISTENTI
# ========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ========================================
# 🌐 RETE PERSONALIZZATA
# ========================================
networks:
  mynutriapp_network:
    driver: bridge
