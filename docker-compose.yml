services:
  web:
    build: .
    container_name: mynutriapp_web
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      # Database configuration (costruito da variabili separate)
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=mynutriapp
      - DB_USER=mynutriapp
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_TRACK_MODIFICATIONS=False
      # Redis configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RATELIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # Gunicorn configuration
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-30}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      # Security: Crittografia dati sensibili
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Security: Admin configuration
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_PHONE=${ADMIN_PHONE}
      - ADMIN_NAME=${ADMIN_NAME:-MyNutriApp}
      # Security: Session configuration
      - SESSION_LIFETIME=${SESSION_LIFETIME:-7200}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-True}
      - SESSION_COOKIE_HTTPONLY=${SESSION_COOKIE_HTTPONLY:-True}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      - SESSION_REFRESH_EACH_REQUEST=${SESSION_REFRESH_EACH_REQUEST:-True}
      - SESSION_PROTECTION=${SESSION_PROTECTION:-strong}
      # Security: CSRF
      - WTF_CSRF_ENABLED=${WTF_CSRF_ENABLED:-True}
      - WTF_CSRF_TIME_LIMIT=${WTF_CSRF_TIME_LIMIT:-3600}
      # Security: Secret key (obbligatorio)
      - SECRET_KEY=${SECRET_KEY}
      # Rate limiting
      - RATELIMIT_ENABLED=${RATELIMIT_ENABLED:-True}
      - RATELIMIT_DEFAULT_PER_DAY=${RATELIMIT_DEFAULT_PER_DAY:-5000}
      - RATELIMIT_DEFAULT_PER_HOUR=${RATELIMIT_DEFAULT_PER_HOUR:-200}
      - RATELIMIT_LOGIN_LIMIT=${RATELIMIT_LOGIN_LIMIT:-20 per 15 minutes}
      - RATELIMIT_CREATE_LIMIT=${RATELIMIT_CREATE_LIMIT:-100 per hour}
      - RATELIMIT_UPLOAD_LIMIT=${RATELIMIT_UPLOAD_LIMIT:-50 per hour}
      # Upload configuration
      - UPLOAD_ROOT=${UPLOAD_ROOT:-static/uploads}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10}
      # Audit log
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS:-730}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mynutriapp_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  db:
    image: mysql:8.0
    container_name: mynutriapp_db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=mynutriapp
      - MYSQL_USER=mynutriapp
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_INNODB_BUFFER_POOL_SIZE=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
      - MYSQL_MAX_CONNECTIONS=${MYSQL_MAX_CONNECTIONS:-50}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql-production.cnf:/etc/mysql/conf.d/production.cnf:ro
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "bash", "-c", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - mynutriapp_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: mynutriapp_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass $${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD} --raw incr ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - mynutriapp_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # phpMyAdmin opzionale: decommentare solo quando serve, poi fermare con: docker-compose stop phpmyadmin
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin:latest
  #   container_name: mynutriapp_phpmyadmin
  #   environment:
  #     - PMA_HOST=db
  #     - PMA_PORT=3306
  #     - PMA_USER=mynutriapp
  #     - PMA_PASSWORD=${MYSQL_PASSWORD}
  #     - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
  #   ports:
  #     - "127.0.0.1:8080:80"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - mynutriapp_network
  #   restart: "no"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  mynutriapp_network:
    driver: bridge
