# ========================================
# 🐳 DOCKER COMPOSE PER MYNUTRIAPP
# Orchestrazione di tutti i servizi
# ========================================

version: '3.8'

services:
  # ========================================
  # 🌐 APPLICAZIONE FLASK (Web Server)
  # ========================================
  web:
    build: .
    container_name: mynutriapp_web
    # Porta NON esposta direttamente, solo tramite Nginx
    expose:
      - "8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://mynutriapp:${MYSQL_PASSWORD}@db:3306/mynutriapp?charset=utf8mb4
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RATELIMIT_STORAGE_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - mynutriapp_network

  # ========================================
  # 🌐 NGINX (Reverse Proxy & Static Files)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: mynutriapp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-rate-limit.conf:/etc/nginx/conf.d/rate-limit.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./logs/nginx:/var/log/nginx
      # Monta certificati SSL (solo lettura)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - mynutriapp_network

  # ========================================
  # 🗄️ DATABASE MYSQL
  # ========================================
  db:
    image: mysql:8.0
    container_name: mynutriapp_db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=mynutriapp
      - MYSQL_USER=mynutriapp
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      # Ottimizzazioni MySQL per produzione
      - MYSQL_INNODB_BUFFER_POOL_SIZE=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - MYSQL_MAX_CONNECTIONS=${MYSQL_MAX_CONNECTIONS:-200}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql-production.cnf:/etc/mysql/conf.d/production.cnf:ro
    ports:
      - "3306:3306"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # Verifica che MySQL sia pronto e che il database sia accessibile
      # MySQL esegue init.sql automaticamente al primo avvio (quando il volume è vuoto)
      # start_period di 30s dà tempo a MySQL di eseguire init.sql completamente
      test: ["CMD", "bash", "-c", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} > /dev/null 2>&1 && mysql -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} -e 'USE mynutriapp; SELECT 1;' > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - mynutriapp_network

  # ========================================
  # ⚡ REDIS (Rate Limiting & Cache)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: mynutriapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mynutriapp_network

  # ========================================
  # 📊 PHPMYADMIN (Gestione Database - Opzionale)
  # ========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mynutriapp_phpmyadmin
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - mynutriapp_network

  # ========================================
  # 🔐 CERTBOT (SSL Certificates - Containerizzato)
  # ========================================
  certbot:
    image: certbot/certbot:latest
    container_name: mynutriapp_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/logs:/var/log/letsencrypt
    networks:
      - mynutriapp_network
    # Entrypoint per rinnovo automatico (esegue ogni 12 ore)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

# ========================================
# 💾 VOLUMI PERSISTENTI
# ========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ========================================
# 🌐 RETE PERSONALIZZATA
# ========================================
networks:
  mynutriapp_network:
    driver: bridge
